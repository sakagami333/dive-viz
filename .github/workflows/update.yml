name: Update Dive Data

on:
  schedule:
    - cron: '0 2 * * *'   # 毎日 UTC 02:00（JST 11:00）
  workflow_dispatch:        # 手動実行

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch & convert dive data
        env:
          SUBSURFACE_EMAIL: ${{ secrets.SUBSURFACE_EMAIL }}
          SUBSURFACE_PASSWORD: ${{ secrets.SUBSURFACE_PASSWORD }}
          SUBSURFACE_REPO_URL: ${{ secrets.SUBSURFACE_REPO_URL }}
          OUTPUT_FILE: docs/data.json
        run: python scripts/fetch_and_convert.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || git commit -m "chore: update dive data $(date -u +%Y-%m-%d) [skip ci]"
          git push
